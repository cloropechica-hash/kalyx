<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Migrate IT Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script>
    const fbConfig = {
      apiKey: "AIzaSyB0GxnuZxF0o34z13toRIvBpvdnedZookM",
      authDomain: "kalyx-task.firebaseapp.com",
      projectId: "kalyx-task",
      storageBucket: "kalyx-task.firebasestorage.app",
      messagingSenderId: "816431009992",
      appId: "1:816431009992:web:dabfca4b936951ef2115fd",
      measurementId: "G-D1DLCT2QJR"
    };
    firebase.initializeApp(fbConfig);
    var fbAuth = firebase.auth();
    var fbDb = firebase.firestore();
  </script>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
  <div class="max-w-2xl mx-auto space-y-6">
    <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8">
      <h1 class="text-2xl font-bold text-gray-800 mb-1">Migrate IT Data</h1>
      <p class="text-sm text-gray-500 mb-6">Diretso i-import ang IT data mula backup papunta sa Firebase at localStorage.</p>

      <div class="border border-gray-200 rounded-xl p-4 mb-4">
        <h2 class="font-bold text-gray-700 mb-3">Step 1: Upload Backup File</h2>
        <input id="fileInput" type="file" accept=".json" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/>
        <p id="fileStatus" class="text-xs text-gray-500 mt-2">Pumili ng scheduler-backup-2026-06-04.json</p>
      </div>

      <div class="border border-gray-200 rounded-xl p-4 mb-4">
        <h2 class="font-bold text-gray-700 mb-3">Step 2: Login bilang joseph.diala30@gmail.com</h2>
        <div class="space-y-3">
          <input id="loginPass" type="password" class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm" placeholder="Password"/>
          <button id="loginBtn" onclick="doLogin()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition text-sm">Login</button>
          <p id="loginMsg" class="text-xs text-gray-500 mt-1"></p>
        </div>
      </div>

      <div id="stepMigrate" class="border border-gray-200 rounded-xl p-4 hidden">
        <h2 class="font-bold text-gray-700 mb-3">Step 3: Preview at I-migrate</h2>
        <div id="previewData" class="text-sm text-gray-600 mb-4"></div>
        <button id="migrateBtn" onclick="doMigrate()" class="bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-emerald-700 transition text-sm disabled:bg-gray-400 disabled:cursor-not-allowed" disabled>I-migrate ang IT Data</button>
        <p id="migrateMsg" class="text-xs text-gray-500 mt-2"></p>
      </div>

      <div id="log" class="mt-4 text-sm font-mono bg-gray-900 text-green-400 rounded-xl p-4 h-64 overflow-y-auto hidden"></div>
    </div>
  </div>

  <script>
    var backupData = null;
    var userId = null;
    var username = null;
    var accessToken = null;
    var itData = {};
    var itKeys = [];

    function log(msg, isError) {
      var el = document.getElementById('log');
      el.classList.remove('hidden');
      el.innerHTML += '<span style="color:' + (isError ? '#f87171' : '#4ade80') + '">> ' + msg + '</span><br>';
      el.scrollTop = el.scrollHeight;
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(ev) {
        try {
          backupData = JSON.parse(ev.target.result);
          document.getElementById('fileStatus').textContent = 'Loaded: ' + file.name + ' (' + Object.keys(backupData).length + ' keys)';
          document.getElementById('fileStatus').className = 'text-xs text-emerald-600 mt-2 font-semibold';
          tryEnableMigrate();
        } catch(err) {
          alert('Invalid JSON: ' + err.message);
        }
      };
      reader.readAsText(file);
    });

    function doLogin() {
      var pass = document.getElementById('loginPass').value;
      var btn = document.getElementById('loginBtn');
      var msg = document.getElementById('loginMsg');
      if (!pass) { msg.textContent = 'Ilagay ang password.'; msg.className = 'text-xs text-red-600 mt-1'; return; }
      btn.disabled = true;
      btn.textContent = 'Logging in...';
      msg.textContent = '';

      fbAuth.signInWithEmailAndPassword('joseph.diala30@gmail.com', pass)
        .then(function(result) {
          userId = result.user.uid;
          username = 'joseph_diala';
          msg.textContent = 'Logged in! User: joseph.diala30@gmail.com';
          msg.className = 'text-xs text-emerald-600 mt-1 font-semibold';
          btn.textContent = 'Logged In';
          btn.className = 'bg-gray-400 text-white px-6 py-2 rounded-lg font-bold text-sm cursor-not-allowed';
          tryEnableMigrate();
        })
        .catch(function(err) {
          msg.textContent = 'Error: ' + err.message;
          msg.className = 'text-xs text-red-600 mt-1 font-semibold';
          btn.disabled = false;
          btn.textContent = 'Login';
        });
    }

    function tryEnableMigrate() {
      if (!backupData || !userId) return;

      var sourceUser = 'joseph_diala';
      itKeys = Object.keys(backupData).filter(function(k) {
        return k.indexOf('it_') === 0 && k.indexOf('_' + sourceUser) > 0;
      });

      if (itKeys.length === 0) {
        document.getElementById('previewData').innerHTML = '<p class="text-red-600">Walang IT data para sa joseph_diala.</p>';
        document.getElementById('stepMigrate').classList.remove('hidden');
        return;
      }

      itData = {};
      var total = 0;
      var html = '<p class="font-semibold mb-2">IT Data na makikita:</p><ul class="space-y-1">';
      itKeys.forEach(function(k) {
        var items = Array.isArray(backupData[k]) ? backupData[k].length : 0;
        total += items;
        var shortKey = k.replace('_' + sourceUser, '');
        itData[shortKey] = backupData[k];
        html += '<li class="flex justify-between text-xs"><span>' + shortKey + '</span><span class="font-semibold">' + items + ' items</span></li>';
      });
      html += '<li class="flex justify-between text-xs font-bold border-t pt-1 mt-1"><span>TOTAL</span><span>' + total + ' items</span></li></ul>';
      document.getElementById('previewData').innerHTML = html;
      document.getElementById('stepMigrate').classList.remove('hidden');
      document.getElementById('migrateBtn').disabled = false;
    }

    function doMigrate() {
      var btn = document.getElementById('migrateBtn');
      var msg = document.getElementById('migrateMsg');
      btn.disabled = true;
      btn.textContent = 'Migrating...';
      msg.textContent = '';
      log('===== MIGRATION START =====');

      // I-save muna sa localStorage para may backup
      log('1/3: Saving to localStorage...');
      var lsCount = 0;
      Object.keys(itData).forEach(function(k) {
        localStorage.setItem(k + '_' + username, JSON.stringify(itData[k]));
        lsCount += itData[k].length;
        log('  localStorage: ' + k + '_' + username + ' (' + itData[k].length + ' items)');
      });

      // I-save sa Firebase Firestore
      log('2/3: Saving to Firebase Firestore...');
      var dataPayload = {};
      Object.keys(itData).forEach(function(k) {
        dataPayload[k] = itData[k];
      });

      fbDb.collection('users').doc(userId).set({
        data: dataPayload,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true })
      .then(function() {
        log('  Firebase: Save successful');
        log('3/3: Verifying...');

        var allOk = true;
        Object.keys(itData).forEach(function(k) {
          var saved = localStorage.getItem(k + '_' + username);
          if (saved) {
            var parsed = JSON.parse(saved);
            var ok = Array.isArray(parsed) && parsed.length === itData[k].length;
            log((ok ? '  OK' : '  MISMATCH') + ' ' + k + '_' + username + ': ' + (Array.isArray(parsed) ? parsed.length : 0) + '/' + itData[k].length + ' items', !ok);
            if (!ok) allOk = false;
          } else {
            log('  MISSING ' + k + '_' + username, true);
            allOk = false;
          }
        });

        log('===== DONE =====');
        if (allOk) {
          msg.textContent = 'SUCCESS! ' + Object.keys(itData).length + ' IT data types na-save sa localStorage at Firebase.';
          msg.className = 'text-xs text-emerald-600 mt-2 font-semibold';
          btn.textContent = 'Complete';
        } else {
          msg.textContent = 'May issue - tingnan ang log.';
          msg.className = 'text-xs text-amber-600 mt-2 font-semibold';
          btn.textContent = 'Retry';
          btn.disabled = false;
        }
      })
      .catch(function(err) {
        log('ERROR: ' + (err.message || err), true);
        msg.textContent = 'Error: ' + (err.message || err);
        msg.className = 'text-xs text-red-600 mt-2 font-semibold';
        btn.textContent = 'Retry';
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
