<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Migration Tool</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f4f7fa; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { color: #333; }
    button { background: #0066cc; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 5px; cursor: pointer; }
    button:hover { background: #005bb5; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #log { margin-top: 20px; background: #222; color: #0f0; padding: 15px; border-radius: 5px; height: 400px; overflow-y: auto; font-family: monospace; }
    .log-info { color: #ccc; }
    .log-success { color: #0f0; }
    .log-error { color: #f55; }
    .log-warning { color: #fa0; }
  </style>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <!-- Configuration -->
  <script src="firebase-config.js"></script>
</head>
<body>

  <div class="container">
    <h1>Firebase Data Migration Tool</h1>
    <p>This tool will read <code>scheduler-backup-2026-06-22.json</code>, remove duplicate emails, and upload the accounts and their data directly to Firebase.</p>
    
    <button id="startBtn">Start Upload</button>
    
    <div id="log">Waiting to start...</div>
  </div>

  <script src="scripts/migration.js"></script>
</body>
</html>
